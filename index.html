<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jack & Chi - Love Diary</title>
  </head>
  <body>
    <div id="app">
      <!-- Scene 1: Entrance -->
      <section class="scene" id="entrance-scene">
        <div class="entrance-wrapper">
          <div class="entrance-text">
            <div class="text-script">welcome to</div>
            <div class="text-main">Jack & Chi</div>
            <div class="text-script">love diary</div>
          </div>
          <!-- We use a wrapper to handle the scale transform properly -->
          <div class="arch-container">
            <img src="/assets/entrance.png" class="arch-img" alt="arch">
          </div>
        </div>
      </section>

      <!-- Scene 2: Japan -->
      <section class="scene" id="japan-scene">
        <div class="japan-components">
          <!-- Text Overlay -->
          <div class="j-comp j-text">
            <div class="j-text-year">2024</div>
            <div class="j-text-sub">first met in Japan</div>
          </div>
          <img src="/assets/japan_component/z index 1. fuji mountpng.png" class="j-comp j-z1" alt="Fuji">
          <img src="/assets/japan_component/z index 2 building center.png" class="j-comp j-z2" alt="Building Center">
          <img src="/assets/japan_component/z index 3. building left. png.png" class="j-comp j-z3" alt="Building Left">
          <img src="/assets/japan_component/z index 4 building right.png" class="j-comp j-z4" alt="Building Right">
          <img src="/assets/japan_component/z index 5 flower tree.png" class="j-comp j-z5" alt="Flower Tree">
          <img src="/assets/japan_component/z index 6 japan flag.png" class="j-comp j-z6" alt="Japan Flag">
          <img src="/assets/japan_component/z index 7 bird.png" class="j-comp j-z7" alt="Bird">
          <img src="/assets/japan_component/z index 8 cloud.png" class="j-comp j-z8" alt="Cloud">
          <img src="/assets/japan_component/z index 9 crane .png" class="j-comp j-z9" alt="Crane">
          <img src="/assets/japan_component/z index 10 cat.png" class="j-comp j-z10" alt="Cat">
          <img src="/assets/japan_component/z index 11 sushi.png" class="j-comp j-z11" alt="Sushi">
          <img src="/assets/japan_component/z index 12 cat mask.png" class="j-comp j-z12" alt="Cat Mask">
          <img src="/assets/japan_component/z index 15 left hand.png" class="j-comp j-z15" alt="Left Hand">
          <img src="/assets/japan_component/z index 16 right hand.png" class="j-comp j-z16" alt="Right Hand">
        </div>
      </section>

      <!-- Scene 3: Europe -->
      <section class="scene" id="europe-scene">
        <div class="europe-components">
          <!-- Text Overlay -->
          <div class="e-comp e-text">
            <div class="e-text-year">2025</div>
            <div class="e-text-sub">Europe travel together</div>
          </div>
          <img src="/assets/Europe component/z index 1 wheel.png" class="e-comp e-z1" alt="wheel">
          <img src="/assets/Europe component/z index 2 E tower.png" class="e-comp e-z2" alt="E tower">
          <img src="/assets/Europe component/z index 3 piza tower.png" class="e-comp e-z3" alt="piza tower">
          <img src="/assets/Europe component/z index 4 big ben.png" class="e-comp e-z4" alt="big ben">
          <img src="/assets/Europe component/z index 5 england phone.png" class="e-comp e-z5" alt="england phone">
          <img src="/assets/Europe component/z index 6 center building.png" class="e-comp e-z6" alt="center building">
          <img src="/assets/Europe component/z index 7 left building.png" class="e-comp e-z7" alt="left building">
          <img src="/assets/Europe component/z index 8 right building.png" class="e-comp e-z8" alt="right building">
          <img src="/assets/Europe component/z index 9 london.png" class="e-comp e-z9" alt="london">
          <img src="/assets/Europe component/z index 10 statue.png" class="e-comp e-z10" alt="statue">
          <img src="/assets/Europe component/z index 11 hand.png" class="e-comp e-z11" alt="hand">
          <img src="/assets/Europe component/z index 12 painting.png" class="e-comp e-z12" alt="painting">
          <img src="/assets/Europe component/z index 13 hearts.png" class="e-comp e-z13" alt="hearts">
          <img src="/assets/Europe component/z index 14 stars.png" class="e-comp e-z14" alt="stars">
          <img src="/assets/Europe component/z index 15 flower.png" class="e-comp e-z15" alt="flower">
        </div>
      </section>

      <section class="scene placeholder" id="vietnam-scene">
        <h2>Vietnam (2026)</h2>
        <p>Coming Soon...</p>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
